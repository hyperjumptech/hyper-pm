name: Publish hyper-pm apps to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing + provenance require npm CLI >= 11.5.1 (see npm trusted-publishers docs).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set "version=${VERSION}" --prefix apps/hyper-pm
          npm pkg set "version=${VERSION}" --prefix apps/hyper-pm-web
          npm pkg set "version=${VERSION}" --prefix apps/hyper-pm-mcp

      - name: Build
        run: pnpm build --filter=...hyper-pm

      - name: Publish hyper-pm
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish --filter hyper-pm --access public --no-git-checks

      - name: Publish hyper-pm-web
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish --filter hyper-pm-web --access public --no-git-checks

      - name: Publish hyper-pm-mcp
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish --filter hyper-pm-mcp --access public --no-git-checks
