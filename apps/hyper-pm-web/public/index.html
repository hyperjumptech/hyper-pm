<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>hyper-pm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-sans: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
        --font-mono: "IBM Plex Mono", ui-monospace, monospace;
        --bg: #f4f4f5;
        --bg-elevated: #ffffff;
        --text: #18181b;
        --text-secondary: #52525b;
        --text-tertiary: #a1a1aa;
        --border: #e4e4e7;
        --border-strong: #d4d4d8;
        --sidebar-bg: #09090b;
        --sidebar-surface: rgba(255, 255, 255, 0.04);
        --sidebar-hover: rgba(255, 255, 255, 0.07);
        --sidebar-active: rgba(255, 255, 255, 0.11);
        --sidebar-text: #fafafa;
        --sidebar-muted: #a1a1aa;
        --accent: #4338ca;
        --accent-hover: #3730a3;
        --accent-subtle: #eef2ff;
        --danger: #b91c1c;
        --danger-bg: #fef2f2;
        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.04);
        --shadow-lg:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 12px 24px -4px rgba(0, 0, 0, 0.08);
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      .app-shell {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 16.25rem;
        flex-shrink: 0;
        background: var(--sidebar-bg);
        color: var(--sidebar-text);
        display: flex;
        flex-direction: column;
        padding: 1.25rem 0 0;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
      }

      .brand {
        font-weight: 600;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
        padding: 0 1rem 1.25rem;
        margin: 0 0.75rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .brand span {
        display: block;
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sidebar-muted);
        margin-bottom: 0.25rem;
      }

      nav[aria-label="Main navigation"] {
        flex: 1;
        padding: 0.5rem 0;
        overflow-y: auto;
      }

      .nav-section {
        font-size: 0.625rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--sidebar-muted);
        padding: 1rem 1.25rem 0.375rem;
      }

      .nav-btn {
        display: flex;
        align-items: center;
        width: calc(100% - 1rem);
        margin: 0.125rem 0.5rem;
        text-align: left;
        padding: 0.625rem 0.875rem;
        border: none;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--sidebar-text);
        font: inherit;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s var(--ease),
          color 0.15s var(--ease);
      }

      .nav-btn:hover {
        background: var(--sidebar-hover);
      }

      .nav-btn[aria-current="true"] {
        background: var(--sidebar-active);
        color: #fff;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .workspace {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: linear-gradient(180deg, #fafafa 0%, var(--bg) 32%);
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.125rem 1.75rem;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.375rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1.2;
      }

      .health {
        margin: 0.35rem 0 0;
        font-size: 0.8125rem;
        color: var(--text-secondary);
        max-width: min(36rem, 100%);
        line-height: 1.45;
      }

      .toolbar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 0.125rem;
      }

      main#main {
        flex: 1;
        padding: 1.5rem 1.75rem 2.5rem;
        overflow: auto;
        max-width: 72rem;
        width: 100%;
        margin: 0 auto;
      }

      .panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem 1.375rem;
        box-shadow: var(--shadow-sm);
      }

      .panel + .panel {
        margin-top: 1.25rem;
      }

      .panel-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem 1rem;
        margin-bottom: 1rem;
        padding-bottom: 0.875rem;
        border-bottom: 1px solid var(--border);
      }

      .panel-head h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .panel h3 {
        margin: 1rem 0 0.5rem;
        font-size: 0.8125rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
      }

      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-secondary);
        margin: 0.875rem 0 0.375rem;
      }

      label:first-of-type,
      .panel > label:first-child {
        margin-top: 0;
      }

      input[type="text"],
      input[type="password"],
      textarea,
      select {
        width: 100%;
        max-width: 36rem;
        font: inherit;
        font-size: 0.9375rem;
        padding: 0.5625rem 0.75rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: #fafafa;
        color: var(--text);
        transition:
          border-color 0.15s var(--ease),
          box-shadow 0.15s var(--ease),
          background 0.15s var(--ease);
      }

      input:hover,
      textarea:hover,
      select:hover {
        border-color: #a1a1aa;
        background: #fff;
      }

      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: none;
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px var(--accent-subtle);
      }

      textarea {
        min-height: 5.5rem;
        resize: vertical;
        line-height: 1.55;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.75rem;
      }

      button {
        font: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: var(--radius-sm);
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-strong);
        background: var(--bg-elevated);
        color: var(--text);
        transition:
          background 0.15s var(--ease),
          border-color 0.15s var(--ease),
          box-shadow 0.15s var(--ease),
          transform 0.1s var(--ease);
      }

      button:hover {
        background: #fafafa;
        border-color: #a1a1aa;
      }

      button:active {
        transform: scale(0.98);
      }

      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-subtle);
      }

      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        box-shadow: 0 1px 2px rgba(67, 56, 202, 0.25);
      }

      button.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      button.danger {
        color: #fff;
        background: var(--danger);
        border-color: var(--danger);
      }

      button.danger:hover {
        filter: brightness(1.05);
      }

      button.ghost {
        background: transparent;
        border-color: transparent;
        color: var(--accent);
      }

      button.ghost:hover {
        background: var(--accent-subtle);
        border-color: transparent;
      }

      button.btn-inverted {
        background: var(--sidebar-surface);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--sidebar-text);
      }

      button.btn-inverted:hover {
        background: var(--sidebar-hover);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .table-wrap {
        margin-top: 0.25rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: #fafafa;
      }

      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      .data-table thead {
        background: #f4f4f5;
      }

      .data-table th,
      .data-table td {
        text-align: left;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }

      .data-table th {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-tertiary);
      }

      .data-table tbody tr:last-child td {
        border-bottom: none;
      }

      .data-table tbody tr {
        background: #fff;
        transition: background 0.12s var(--ease);
      }

      .data-table tbody tr:hover {
        background: #fafafa;
      }

      .cell-title {
        font-weight: 500;
        color: var(--text);
        max-width: 20rem;
      }

      .id-chip {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: #f4f4f5;
        padding: 0.2rem 0.45rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .status-pill {
        display: inline-block;
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: capitalize;
        letter-spacing: 0.02em;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        border: 1px solid transparent;
      }

      .status-pill[data-status="backlog"] {
        background: #f4f4f5;
        color: #52525b;
        border-color: var(--border);
      }
      .status-pill[data-status="todo"] {
        background: #eff6ff;
        color: #1d4ed8;
        border-color: #bfdbfe;
      }
      .status-pill[data-status="in_progress"] {
        background: #fffbeb;
        color: #b45309;
        border-color: #fde68a;
      }
      .status-pill[data-status="done"] {
        background: #ecfdf5;
        color: #047857;
        border-color: #a7f3d0;
      }
      .status-pill[data-status="cancelled"] {
        background: #fef2f2;
        color: #b91c1c;
        border-color: #fecaca;
      }

      .muted {
        color: var(--text-secondary);
        font-size: 0.875rem;
        line-height: 1.55;
      }

      .empty-state {
        text-align: center;
        padding: 2.5rem 1.5rem;
        color: var(--text-secondary);
        font-size: 0.9375rem;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
        gap: 1rem;
      }

      .stat-card {
        padding: 1.125rem 1.25rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: linear-gradient(145deg, #ffffff 0%, #fafafa 100%);
        box-shadow: var(--shadow-sm);
      }

      .stat-card .label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-tertiary);
        margin-bottom: 0.35rem;
      }

      .stat-card strong {
        display: block;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
        color: var(--text);
      }

      #toast {
        margin: 0 1.75rem;
        padding: 0.625rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        display: none;
      }

      #toast.show {
        display: block;
      }

      #toast.error {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid #fecaca;
      }

      #toast.ok {
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      .comment {
        border: 1px solid var(--border);
        padding: 0.875rem 1rem;
        margin: 0.625rem 0;
        background: #fafafa;
        border-radius: var(--radius-sm);
      }

      .comment-meta {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-tertiary);
        margin-bottom: 0.375rem;
      }

      .sidebar-footer {
        margin-top: auto;
        padding: 1.125rem 1rem 1.25rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8125rem;
      }

      .sidebar-footer label {
        color: var(--sidebar-muted);
        margin-top: 0;
        font-size: 0.6875rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .sidebar-footer input {
        max-width: 100%;
        margin-top: 0.375rem;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--sidebar-text);
      }

      .sidebar-footer input::placeholder {
        color: #71717a;
      }

      .sidebar-footer input:focus-visible {
        border-color: rgba(255, 255, 255, 0.35);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.12);
      }

      code {
        font-family: var(--font-mono);
        font-size: 0.8125em;
        background: #f4f4f5;
        padding: 0.15em 0.4em;
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .icon-refresh {
        display: inline-block;
        width: 1em;
        height: 1em;
        margin-right: 0.35em;
        vertical-align: -0.15em;
      }

      .filter-bar {
        padding: 0.875rem 1rem;
        background: #fafafa;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1rem;
      }

      .filter-bar label {
        margin-top: 0;
        margin-bottom: 0.35rem;
      }

      .lead {
        margin: 0 0 1rem;
        line-height: 1.55;
      }

      .back-link {
        margin-bottom: 0.75rem;
      }

      .pre-out {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        line-height: 1.5;
        white-space: pre-wrap;
        background: #fafafa;
        padding: 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        max-height: 22rem;
        overflow: auto;
        margin-top: 0.75rem;
      }

      .panel-tools h2 {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span>Workspace</span>
          hyper-pm
        </div>
        <nav aria-label="Main navigation">
          <div class="nav-section">Work items</div>
          <button type="button" class="nav-btn" data-nav="dashboard">
            Overview
          </button>
          <button type="button" class="nav-btn" data-nav="epics">Epics</button>
          <button type="button" class="nav-btn" data-nav="stories">
            Stories
          </button>
          <button type="button" class="nav-btn" data-nav="tickets">
            Tickets
          </button>
          <div class="nav-section">Repository</div>
          <button type="button" class="nav-btn" data-nav="tools">Tools</button>
          <button type="button" class="nav-btn" data-nav="advanced">
            Advanced CLI
          </button>
        </nav>
        <div class="sidebar-footer">
          <label for="bearer">API token</label>
          <input
            type="password"
            id="bearer"
            autocomplete="off"
            placeholder="Optional bearer…"
          />
          <div class="row" style="margin-top: 0.625rem">
            <button type="button" id="saveToken" class="btn-inverted">
              Save token
            </button>
          </div>
        </div>
      </aside>
      <div class="workspace">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Overview</h1>
            <p id="healthLine" class="health">Loading…</p>
          </div>
          <div class="toolbar">
            <button type="button" id="btnRefresh" class="primary">
              <svg
                class="icon-refresh"
                aria-hidden="true"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                  clip-rule="evenodd"
                />
              </svg>
              Refresh
            </button>
          </div>
        </header>
        <div id="toast" role="status" aria-live="polite"></div>
        <main id="main" tabindex="-1"></main>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
