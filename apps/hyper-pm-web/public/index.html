<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hyper-pm</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --sidebar: #0f172a;
        --sidebar-text: #f1f5f9;
        --sidebar-muted: #94a3b8;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --danger: #dc2626;
        --radius: 8px;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
        min-height: 100vh;
      }
      .app-shell {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 15.5rem;
        flex-shrink: 0;
        background: var(--sidebar);
        color: var(--sidebar-text);
        display: flex;
        flex-direction: column;
        padding: 1rem 0;
      }
      .brand {
        font-weight: 700;
        font-size: 1.1rem;
        padding: 0 1rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        margin-bottom: 0.5rem;
      }
      .nav-section {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--sidebar-muted);
        padding: 0.75rem 1rem 0.35rem;
      }
      .nav-btn {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.5rem 1rem;
        border: none;
        background: transparent;
        color: var(--sidebar-text);
        font: inherit;
        cursor: pointer;
        border-radius: 0;
      }
      .nav-btn:hover,
      .nav-btn[aria-current="true"] {
        background: rgba(255, 255, 255, 0.08);
      }
      .workspace {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1.25rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .topbar h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
      }
      .health {
        font-size: 0.8rem;
        color: var(--muted);
        max-width: 28rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .toolbar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }
      main#main {
        flex: 1;
        padding: 1.25rem;
        overflow: auto;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        max-width: 56rem;
      }
      .panel + .panel {
        margin-top: 1rem;
      }
      .panel h2 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin: 0.5rem 0 0.2rem;
      }
      input[type="text"],
      input[type="password"],
      textarea,
      select {
        width: 100%;
        max-width: 32rem;
        font: inherit;
        padding: 0.45rem 0.55rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
      }
      textarea {
        min-height: 5rem;
        resize: vertical;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.5rem;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 6px;
        padding: 0.45rem 0.85rem;
        border: 1px solid var(--border);
        background: var(--surface);
      }
      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      button.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      button.danger {
        color: #fff;
        background: var(--danger);
        border-color: var(--danger);
      }
      button.ghost {
        background: transparent;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.6rem;
        border-bottom: 1px solid var(--border);
      }
      th {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        font-weight: 600;
      }
      tr:hover td {
        background: #f1f5f9;
      }
      .muted {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(8rem, 1fr));
        gap: 0.75rem;
      }
      .stat {
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }
      .stat strong {
        display: block;
        font-size: 1.5rem;
        font-weight: 700;
      }
      #toast {
        margin: 0 1.25rem;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        font-size: 0.9rem;
        display: none;
      }
      #toast.show {
        display: block;
      }
      #toast.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
      #toast.ok {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .comment {
        border-left: 3px solid var(--border);
        padding: 0.5rem 0.75rem;
        margin: 0.5rem 0;
        background: #f8fafc;
        border-radius: 0 6px 6px 0;
      }
      .comment-meta {
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }
      .sidebar-footer {
        margin-top: auto;
        padding: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
      }
      .sidebar-footer label {
        color: var(--sidebar-muted);
        margin-top: 0;
      }
      .sidebar-footer input {
        max-width: 100%;
        margin-top: 0.25rem;
      }
      code {
        font-size: 0.85em;
        background: #f1f5f9;
        padding: 0.1em 0.35em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">hyper-pm</div>
        <div class="nav-section">Work items</div>
        <button type="button" class="nav-btn" data-nav="dashboard">
          Overview
        </button>
        <button type="button" class="nav-btn" data-nav="epics">Epics</button>
        <button type="button" class="nav-btn" data-nav="stories">
          Stories
        </button>
        <button type="button" class="nav-btn" data-nav="tickets">
          Tickets
        </button>
        <div class="nav-section">Repository</div>
        <button type="button" class="nav-btn" data-nav="tools">Tools</button>
        <button type="button" class="nav-btn" data-nav="advanced">
          Advanced CLI
        </button>
        <div class="sidebar-footer">
          <label for="bearer">API token (optional)</label>
          <input
            type="password"
            id="bearer"
            autocomplete="off"
            placeholder="Bearer secret"
          />
          <div class="row" style="margin-top: 0.5rem">
            <button
              type="button"
              id="saveToken"
              class="ghost"
              style="color: #e2e8f0; border-color: #475569"
            >
              Save
            </button>
          </div>
        </div>
      </aside>
      <div class="workspace">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Overview</h1>
            <p id="healthLine" class="health">Loading…</p>
          </div>
          <div class="toolbar">
            <button type="button" id="btnRefresh" class="primary">
              Refresh
            </button>
          </div>
        </header>
        <div id="toast" role="status" aria-live="polite"></div>
        <main id="main" tabindex="-1"></main>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
